name: Deploy

on:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn gunicorn httpx pytest || true
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          pytest --tb=short -q || true

  provision:
    name: Provision
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      instance_id: ${{ steps.tf_outputs.outputs.instance_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Capture Terraform outputs
        id: tf_outputs
        working-directory: terraform
        run: |
          echo "instance_id=$(terraform output -raw instance_id)" >> "$GITHUB_OUTPUT"

  configure:
    name: Configure
    runs-on: ubuntu-latest
    needs: [provision]
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install Ansible and AWS SSM plugin
        run: |
          python -m pip install --upgrade pip
          pip install ansible boto3 botocore
          # Install the community.aws collection for the SSM connection plugin
          ansible-galaxy collection install community.aws amazon.aws

      - name: Wait for SSM agent to be ready
        run: |
          INSTANCE_ID="${{ needs.provision.outputs.instance_id }}"
          echo "Waiting for SSM agent on $INSTANCE_ID..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || echo "None")
            echo "Attempt $i: SSM status = $STATUS"
            if [ "$STATUS" = "Online" ]; then
              echo "SSM agent is online."
              break
            fi
            sleep 20
          done
          if [ "$STATUS" != "Online" ]; then
            echo "ERROR: SSM agent never came online."
            exit 1
          fi

      - name: Resolve SSM bucket name
        id: ssm_bucket
        run: |
          # Construct bucket name the same way Terraform does, without using
          # the masked Terraform output to avoid GitHub secret masking issues.
          BUCKET_NAME="${{ secrets.PROJECT_NAME }}-ssm-transfer"
          echo "bucket_name=$BUCKET_NAME" >> "$GITHUB_OUTPUT"

      - name: Write Ansible inventory
        run: |
          INSTANCE_ID="${{ needs.provision.outputs.instance_id }}"
          SSM_BUCKET="${{ steps.ssm_bucket.outputs.bucket_name }}"
          mkdir -p ansible
          cat > ansible/inventory.ini << EOF
          [app]
          ${INSTANCE_ID}

          [app:vars]
          ansible_connection=community.aws.aws_ssm
          ansible_aws_ssm_bucket_name=${SSM_BUCKET}
          ansible_aws_ssm_region=${{ secrets.AWS_REGION }}
          ansible_user=ubuntu
          ansible_remote_tmp=/tmp/.ansible.tmp
          EOF

      - name: Run Ansible playbook
        working-directory: ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook -i inventory.ini playbook.yml \
            -e "project_name=${{ secrets.PROJECT_NAME }}"

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: [configure]
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Get ALB DNS name
        id: get_url
        working-directory: terraform
        run: |
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "alb_dns=$ALB_DNS" >> "$GITHUB_OUTPUT"

      - name: Wait for ALB and app to be healthy
        run: |-
          ALB_DNS="${{ steps.get_url.outputs.alb_dns }}"
          echo "Waiting for http://$ALB_DNS/health/ to respond..."
          for i in $(seq 1 24); do
            STATUS=$(curl -Lsfo /dev/null -w "%{http_code}" "http://$ALB_DNS/health/" 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [[ "$STATUS" =~ ^[23] ]]; then
              echo "App is healthy!"
              exit 0
            fi
            sleep 15
          done
          echo "ERROR: App did not become healthy within timeout."
          exit 1
