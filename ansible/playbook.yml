---
- name: Configure app host via SSM
  hosts: "{{ target_instance_id }}"
  gather_facts: true
  become: true

  vars:
    app_dir: /opt/app
    venv_dir: /opt/app/.venv
    app_user: ubuntu
    app_port: 8000
    ansible_remote_tmp: /tmp/.ansible.tmp

  tasks:
    - name: Wait for system to be ready
      ansible.builtin.wait_for_connection:
        timeout: 120

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install system packages
      ansible.builtin.apt:
        name:
          - python3.12
          - python3.12-venv
          - python3-pip
          - nginx
          - curl
        state: present

    - name: Create app directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Copy main entrypoint
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../main.py"
        dest: "{{ app_dir }}/main.py"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"

    - name: Copy app package
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../app/"
        dest: "{{ app_dir }}/app/"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
        directory_mode: "0755"

    - name: Check if public directory exists locally
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../public"
      register: public_dir_stat
      delegate_to: localhost
      become: false
      vars:
        ansible_connection: local

    - name: Copy public directory if it exists
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../public/"
        dest: "{{ app_dir }}/public/"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
        directory_mode: "0755"
      when: public_dir_stat.stat.exists

    - name: Copy requirements.txt if it exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../requirements.txt"
      register: req_stat
      delegate_to: localhost
      become: false
      vars:
        ansible_connection: local

    - name: Copy requirements.txt to app dir
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../requirements.txt"
        dest: "{{ app_dir }}/requirements.txt"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
      when: req_stat.stat.exists

    - name: Create virtual environment
      ansible.builtin.command:
        cmd: python3.12 -m venv {{ venv_dir }}
        creates: "{{ venv_dir }}/bin/python"

    - name: Chown venv to app user
      ansible.builtin.file:
        path: "{{ venv_dir }}"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: true

    - name: Upgrade pip in venv
      ansible.builtin.pip:
        name: pip
        state: latest
        virtualenv: "{{ venv_dir }}"
        virtualenv_python: python3.12

    - name: Install base Python packages
      ansible.builtin.pip:
        name:
          - fastapi
          - uvicorn[standard]
          - gunicorn
          - python-multipart
        state: present
        virtualenv: "{{ venv_dir }}"
        virtualenv_python: python3.12

    - name: Install requirements.txt if present
      ansible.builtin.pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ venv_dir }}"
        virtualenv_python: python3.12
      when: req_stat.stat.exists

    - name: Write app environment file
      ansible.builtin.shell: |
        cat > /opt/app/.env << 'EOF'
        PORT=8000
        HOST=0.0.0.0
        APP_ENV=production
        EOF
        chown {{ app_user }}:{{ app_user }} /opt/app/.env
        chmod 640 /opt/app/.env
      args:
        executable: /bin/bash

    - name: Write systemd service unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/app.service
        mode: "0644"
        content: |
          [Unit]
          Description=FastAPI App (gunicorn + uvicorn)
          After=network.target

          [Service]
          User={{ app_user }}
          Group={{ app_user }}
          WorkingDirectory={{ app_dir }}
          EnvironmentFile={{ app_dir }}/.env
          ExecStart={{ venv_dir }}/bin/gunicorn app.main:app \
            -k uvicorn.workers.UvicornWorker \
            -w 4 \
            -b 0.0.0.0:{{ app_port }}
          Restart=always
          RestartSec=5
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start app service
      ansible.builtin.systemd:
        name: app
        enabled: true
        state: restarted

    - name: Write nginx configuration
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/app
        mode: "0644"
        content: |
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass http://127.0.0.1:{{ app_port }};
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_connect_timeout 60s;
                  proxy_read_timeout 60s;
              }
          }

    - name: Enable nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/app
        dest: /etc/nginx/sites-enabled/app
        state: link

    - name: Remove nginx default site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Enable and start nginx
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: restarted

    - name: Wait for app to be listening on port 8000
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ app_port }}"
        timeout: 60

- name: Apply localhost tasks with local connection
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Confirm configuration complete
      ansible.builtin.debug:
        msg: "Configuration complete - app deployed via SSM."
