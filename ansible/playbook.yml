---
- name: Configure application server
  hosts: app
  become: true
  gather_facts: true

  vars:
    app_dir: /opt/app
    venv_dir: /opt/app/.venv
    app_user: ubuntu
    app_group: ubuntu
    ansible_remote_tmp: /tmp/.ansible.tmp

  tasks:
    #  System packages 

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install system packages
      ansible.builtin.apt:
        name:
          - python3.12
          - python3.12-venv
          - python3.12-dev
          - python3-pip
          - nginx
          - curl
          - git
        state: present

    #  Application directory 

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0755"

    #  Sync application code 
    # Each file/directory is copied individually using playbook_dir/../ paths
    # to resolve from repo root (not ansible/files/).

    - name: Check if app package directory exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../app"
      register: app_pkg_stat
      delegate_to: localhost
      become: false

    - name: Copy app package
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../app/"
        dest: "{{ app_dir }}/app/"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0644"
      when: app_pkg_stat.stat.exists

    - name: Check if main.py exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../main.py"
      register: main_py_stat
      delegate_to: localhost
      become: false

    - name: Copy main.py
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../main.py"
        dest: "{{ app_dir }}/main.py"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0644"
      when: main_py_stat.stat.exists

    - name: Check if requirements.txt exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../requirements.txt"
      register: req_stat
      delegate_to: localhost
      become: false

    - name: Copy requirements.txt
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../requirements.txt"
        dest: "{{ app_dir }}/requirements.txt"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0644"
      when: req_stat.stat.exists

    - name: Check if public/ directory exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../public"
      register: public_stat
      delegate_to: localhost
      become: false

    - name: Copy public/ directory
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../public/"
        dest: "{{ app_dir }}/public/"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0644"
      when: public_stat.stat.exists

    #  Python virtual environment 

    - name: Create Python 3.12 virtual environment
      ansible.builtin.command:
        cmd: python3.12 -m venv "{{ venv_dir }}"
        creates: "{{ venv_dir }}/bin/activate"

    - name: Set venv ownership to ubuntu
      ansible.builtin.file:
        path: "{{ venv_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        recurse: true

    - name: Upgrade pip in venv
      ansible.builtin.command:
        cmd: "{{ venv_dir }}/bin/pip install --upgrade pip"

    - name: Install base Python dependencies
      ansible.builtin.command:
        cmd: "{{ venv_dir }}/bin/pip install fastapi uvicorn[standard] gunicorn"

    - name: Install requirements.txt if present
      ansible.builtin.command:
        cmd: "{{ venv_dir }}/bin/pip install -r {{ app_dir }}/requirements.txt"
      when: req_stat.stat.exists

    #  Environment file 

    - name: Write .env file
      ansible.builtin.shell: |
        cat > {{ app_dir }}/.env << 'ENVEOF'
        APP_ENV=production
        PORT=8000
        HOST=0.0.0.0
        ENVEOF
      args:
        executable: /bin/bash

    - name: Set .env ownership
      ansible.builtin.file:
        path: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0640"

    #  Systemd service 

    - name: Write systemd unit file for app
      ansible.builtin.copy:
        dest: /etc/systemd/system/app.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=FastAPI Application
          After=network.target

          [Service]
          Type=simple
          User={{ app_user }}
          Group={{ app_group }}
          WorkingDirectory={{ app_dir }}
          EnvironmentFile={{ app_dir }}/.env
          ExecStart={{ venv_dir }}/bin/gunicorn app.main:app \
            -k uvicorn.workers.UvicornWorker \
            -w 4 \
            -b 0.0.0.0:8000
          Restart=always
          RestartSec=5
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start app service
      ansible.builtin.systemd:
        name: app
        enabled: true
        state: restarted

    #  Nginx reverse proxy 

    - name: Write nginx site config
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/app
        owner: root
        group: root
        mode: "0644"
        content: |
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass         http://127.0.0.1:8000;
                  proxy_set_header   Host $host;
                  proxy_set_header   X-Real-IP $remote_addr;
                  proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_read_timeout 60;
                  proxy_connect_timeout 60;
              }
          }

    - name: Enable nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/app
        dest: /etc/nginx/sites-enabled/app
        state: link

    - name: Remove default nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Test nginx configuration
      ansible.builtin.command:
        cmd: nginx -t

    - name: Enable and restart nginx
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: restarted

    #  Health check 

    - name: Wait for app to be ready on port 8000
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 8000
        timeout: 60
        state: started

    - name: Verify health endpoint responds
      ansible.builtin.uri:
        url: http://127.0.0.1:8000/health/
        method: GET
        status_code: [200, 301, 302, 307, 308]
        timeout: 10
      register: health_result
      retries: 5
      delay: 5
      until: health_result.status in [200, 301, 302, 307, 308]